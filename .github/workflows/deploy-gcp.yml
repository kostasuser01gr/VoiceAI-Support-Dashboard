name: Deploy to Cloud Run

on:
  workflow_dispatch:
  push:
    branches: ["main"]

env:
  SERVICE_NAME: voice-to-action-agent
  REGION: europe-west1

jobs:
  preflight:
    runs-on: ubuntu-latest
    outputs:
      can_deploy: ${{ steps.check.outputs.can_deploy }}
    steps:
      - id: check
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          if [[ -n "${GCP_SA_KEY}" && -n "${GEMINI_API_KEY}" ]]; then
            echo "can_deploy=true" >> "$GITHUB_OUTPUT"
          else
            echo "can_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v5

      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      - name: Deploy
        run: |
          gcloud run deploy "$SERVICE_NAME" \
            --source . \
            --region "$REGION" \
            --allow-unauthenticated \
            --set-env-vars "GEMINI_API_KEY=${{ secrets.GEMINI_API_KEY }},HISTORY_MODE=local,RATE_LIMIT_PER_MIN=20,MAX_INPUT_CHARS=2000"

      - name: Show URL
        run: |
          gcloud run services describe "$SERVICE_NAME" --region "$REGION" --format='value(status.url)'

  skip-missing-secrets:
    needs: preflight
    if: ${{ needs.preflight.outputs.can_deploy != 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip deploy when required secrets are not configured
        run: |
          echo "Skipping Cloud Run deploy."
          echo "Missing one or both secrets: GCP_SA_KEY, GEMINI_API_KEY."
