name: Weekly Hardening Dashboard

on:
  schedule:
    - cron: "0 8 * * 1"  # 08:00 UTC every Monday
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  dashboard:
    name: Publish Hardening Dashboard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      - name: Run tests and capture coverage
        run: npm test -- --coverage --reporter=json --outputFile=/tmp/test-results.json
        continue-on-error: true

      - name: Generate dashboard summary
        id: dashboard
        run: |
          node - << 'EOF'
          const fs = require('fs');

          // Read registers
          const metrics = JSON.parse(fs.readFileSync('.black-vault/MetricsLedger.json', 'utf8'));
          const risks = JSON.parse(fs.readFileSync('.black-vault/RiskRegister.json', 'utf8'));
          const findings = JSON.parse(fs.readFileSync('.black-vault/FindingsRegister.json', 'utf8'));

          const latest = metrics.metrics[metrics.metrics.length - 1];
          const openRisks = risks.risks.filter(r => r.status === 'OPEN').length;
          const openFindings = findings.findings.filter(f => f.status !== 'VERIFIED').length;

          const summary = `## Hardening Dashboard — ${new Date().toISOString().slice(0,10)}

          | Metric | Value |
          |--------|-------|
          | Protocol | PROJECT_OPS_V13_BLACK_VAULT_ENTERPRISE |
          | Last Commit | ${latest?.commit || 'N/A'} |
          | Tests | ${latest?.gates?.G4_test_count || 'N/A'} passing |
          | Coverage (lines) | ${latest?.gates?.G6_coverage_lines || 'N/A'}% |
          | Coverage (branches) | ${latest?.gates?.G6_coverage_branches || 'N/A'}% |
          | Mutation (rbac.ts) | ${latest?.gates?.G7_mutation_rbac || 'N/A'}% |
          | Mutation (overall) | ${latest?.gates?.G7_mutation_overall || 'N/A'}% |
          | SAST findings | ${latest?.gates?.G9_findings || '0'} |
          | Open findings | ${openFindings} |
          | Open risks | ${openRisks} |
          | Container (CRITICAL/HIGH) | ${latest?.gates?.G12_container_critical || '0'} / ${latest?.gates?.G12_container_high || '0'} |

          ### Open Risks
          ${risks.risks.filter(r => r.status === 'OPEN').map(r => `- **${r.id}** (${r.impact}): ${r.description}`).join('\n')}

          ---
          *Auto-generated by hardening-dashboard workflow*
          *Protocol: PROJECT_OPS_V13_BLACK_VAULT_ENTERPRISE*`;

          fs.writeFileSync('/tmp/dashboard.md', summary);
          console.log(summary);
          EOF

      - name: Create or update dashboard issue
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7.1.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/dashboard.md', 'utf8');
            const title = `[DASHBOARD] Hardening Status — ${new Date().toISOString().slice(0,10)}`;

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['type:scan-task']
            });
