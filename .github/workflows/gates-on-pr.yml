name: PR Gates (G1-G10)

on:
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  pull-requests: read

jobs:
  gates:
    name: Run Gates G1–G10
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Setup Node.js
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install --ignore-scripts

      # G1: Build
      - name: G1 — Build
        run: npm run build

      # G2: Lint
      - name: G2 — Lint
        run: npx eslint . --max-warnings 0

      # G3: TypeCheck
      - name: G3 — TypeCheck
        run: npx tsc --noEmit

      # G4: Tests
      - name: G4 — Tests
        run: npm test

      # G6: Coverage
      - name: G6 — Coverage
        run: npm test -- --coverage

      # G8: Dependency Audit
      - name: G8 — Audit
        run: npm audit --audit-level=high

      # G9: SAST
      - name: G9 — SAST (semgrep)
        uses: returntocorp/semgrep-action@713efdd345f3035192eaa63f56867b88e63e4e5d # v1
        with:
          config: p/security-audit
        continue-on-error: false

      # G10: Secrets Scan
      - name: G10 — Secrets scan
        run: |
          echo "Scanning for hardcoded secrets..."
          PATTERNS='(password|secret|api_key|apikey|access_token|private_key)\s*=\s*["\x27][^"$\x27{][^"$\x27{]{7,}'
          if grep -rIiE "$PATTERNS" \
            --include="*.ts" --include="*.tsx" --include="*.js" --include="*.env" \
            --exclude-dir=node_modules --exclude-dir=.next --exclude-dir=coverage \
            . ; then
            echo "FAIL: Potential hardcoded secrets found"
            exit 1
          fi
          echo "PASS: No hardcoded secrets found"
